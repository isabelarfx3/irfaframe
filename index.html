<html>
 <head>
   <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
 </head>
 <body>
   <a-scene>
     <a-assets>
       <img id="bomba" src="bomba.jpg">
       <img id="yunque" src="yunque.jpg">
       <!-- Add asset here -->
       <a-asset-item
         id="character"
         src="aguacate.glb"></a-asset-item>
     </a-assets>


     <a-sky src="#sky"></a-sky>
     <a-plane
       src="#yunque"
       rotation="-90 0 0"
       width="20"
       height="20"></a-plane>
     <a-text
       value="Bori Bori!"
       color="#6AE6AE"
       align="center"
       position="0 3 -4"></a-text>
     <!-- Add entity here: -->
     <a-glb-model
       src="#character"
       position="0 2 -4"
       scale="0.5 0.5 0.5"></a-glb-model>
   </a-scene>
 </body>
</html>
